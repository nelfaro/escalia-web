<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escal IA – Agente de IA para WhatsApp</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" />

  <style>
    :root {
      --background:        #0b1f3b;
      --background-deep:   #060f1e;
      --accent-radial:     #002765;
      --foreground:        #f0eff0;
      --foreground-sub:    #b8c4d4;
      --accent-blue:       #1a6bff;
      --accent-blue-light: #4d8fff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Geist Sans', system-ui, -apple-system, sans-serif;
      background: var(--background);
      color: var(--foreground);
      overflow-x: hidden;
    }

    /* ── LIQUID GLASS ── */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.35)  0%,
        rgba(255, 255, 255, 0.10) 20%,
        rgba(255, 255, 255, 0.00) 40%,
        rgba(255, 255, 255, 0.00) 60%,
        rgba(255, 255, 255, 0.10) 80%,
        rgba(255, 255, 255, 0.35) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: visible;
      display: flex;
      flex-direction: column;
    }

    /* Separate clip wrapper so the blur-overlay can exceed hero bounds */
    .hero-video-clip {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }

    .blur-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 984px;
      height: 527px;
      background: var(--background-deep);
      filter: blur(82px);
      opacity: 0.90;
      z-index: 1;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      flex-shrink: 0;
    }

    .brand {
      font-family: 'General Sans', system-ui, sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--foreground);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 32px;
    }

    .nav-links a {
      font-size: 15px;
      color: var(--foreground);
      opacity: 0.85;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    .nav-cta {
      font-size: 14px;
      font-weight: 500;
      color: var(--foreground);
      text-decoration: none;
      border-radius: 999px;
      padding: 8px 20px;
      transition: background 0.2s ease;
      cursor: pointer;
    }

    .nav-cta:hover {
      background: rgba(26, 107, 255, 0.15) !important;
    }

    .nav-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(240, 239, 240, 0.15),
        transparent
      );
      flex-shrink: 0;
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    .headline {
      font-family: 'General Sans', system-ui, sans-serif;
      font-size: clamp(80px, 12vw, 160px);
      font-weight: 600;
      line-height: 1.02;
      letter-spacing: -0.024em;
      color: var(--foreground);
      white-space: nowrap;
    }

    .gradient-ia {
      background: linear-gradient(to left, #1a6bff, #4d8fff, #7eb8ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.8;
      color: var(--foreground-sub);
      opacity: 0.85;
      max-width: 480px;
      margin-top: 12px;
    }

    .cta-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 32px;
      background: var(--accent-blue);
      color: var(--foreground);
      font-size: 16px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .cta-btn:hover {
      background: var(--accent-blue-light);
    }

    /* ── MARQUEE ── */
    .marquee-section {
      padding-bottom: 40px;
      flex-shrink: 0;
    }

    .marquee-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 48px;
      padding: 0 24px;
    }

    .marquee-label {
      color: rgba(240, 239, 240, 0.45);
      font-size: 14px;
      line-height: 1.5;
      white-space: nowrap;
      min-width: fit-content;
    }

    .marquee-overflow {
      overflow: hidden;
      flex: 1;
    }

    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .marquee-track {
      display: flex;
      align-items: center;
      gap: 64px;
      animation: marquee-scroll 22s linear infinite;
      width: max-content;
    }

    .marquee-item {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .marquee-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--foreground);
      flex-shrink: 0;
    }

    .marquee-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--foreground);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .navbar {
        padding: 16px 20px;
      }

      .headline {
        font-size: clamp(48px, 14vw, 80px);
        white-space: normal;
      }

      .marquee-inner {
        gap: 24px;
      }

      .blur-overlay {
        width: 100%;
        height: 60%;
      }
    }
  </style>
</head>
<body>

<section class="hero">

  <!-- Video background -->
  <div class="hero-video-clip">
    <video
      id="bgVideo"
      src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_065045_c44942da-53c6-4804-b734-f9e07fc22e08.mp4"
      muted
      playsinline
      preload="auto"
    ></video>
  </div>

  <!-- Soft dark blur behind content -->
  <div class="blur-overlay" aria-hidden="true"></div>

  <!-- All foreground content -->
  <div class="hero-inner">

    <nav class="navbar">
      <a class="brand" href="#">Escal IA</a>

      <ul class="nav-links">
        <li><a href="#agente">Agente IA</a></li>
        <li><a href="#dashboard">Dashboard</a></li>
        <li><a href="#casos">Casos</a></li>
        <li><a href="#planes">Planes</a></li>
      </ul>

      <a class="nav-cta liquid-glass" href="#demo">Quiero una demo</a>
    </nav>

    <div class="nav-divider"></div>

    <div class="hero-content">
      <h1 class="headline">Tu agente de <span class="gradient-ia">IA</span></h1>
      <p class="subtitle">
        Responde consultas, convierte leads y cierra ventas por WhatsApp.<br>
        Vos mirás el dashboard. La IA trabaja.
      </p>
      <a class="cta-btn" href="#demo">Agendá tu demo gratis</a>
    </div>

    <div class="marquee-section">
      <div class="marquee-inner">
        <div class="marquee-label">
          Empresas que ya confían<br>en Escal IA
        </div>
        <div class="marquee-overflow">
          <div class="marquee-track" id="marqueeTrack"></div>
        </div>
      </div>
    </div>

  </div>
</section>

<script>
  // ── VIDEO FADE LOOP ──────────────────────────────────────────────
  (function () {
    var video = document.getElementById('bgVideo');
    var FADE_MS = 500;
    var FADE_OUT_BEFORE_S = 0.5;
    var fadeRAF = null;
    var fadeOutScheduled = false;

    function cancelFade() {
      if (fadeRAF) {
        cancelAnimationFrame(fadeRAF);
        fadeRAF = null;
      }
    }

    function animateFade(from, to, onDone) {
      var startTime = performance.now();
      function step(now) {
        var t = Math.min((now - startTime) / FADE_MS, 1);
        video.style.opacity = from + (to - from) * t;
        if (t < 1) {
          fadeRAF = requestAnimationFrame(step);
        } else {
          fadeRAF = null;
          if (onDone) onDone();
        }
      }
      fadeRAF = requestAnimationFrame(step);
    }

    function fadeIn() {
      cancelFade();
      animateFade(0, 1, null);
    }

    function fadeOut(onDone) {
      cancelFade();
      animateFade(1, 0, onDone);
    }

    // Start playback as soon as we have enough data
    video.addEventListener('canplay', function onReady() {
      video.removeEventListener('canplay', onReady);
      video.style.opacity = 0;
      video.play().catch(function () {});
      fadeIn();
    });

    // Fade out before the video ends, then replay
    video.addEventListener('timeupdate', function () {
      if (
        !fadeOutScheduled &&
        video.duration &&
        !isNaN(video.duration) &&
        video.duration - video.currentTime <= FADE_OUT_BEFORE_S
      ) {
        fadeOutScheduled = true;
        fadeOut(function () {
          setTimeout(function () {
            video.currentTime = 0;
            video.play().catch(function () {});
            fadeOutScheduled = false;
            fadeIn();
          }, 100);
        });
      }
    });
  })();

  // ── MARQUEE ─────────────────────────────────────────────────────
  (function () {
    var items = [
      { initial: 'C', name: 'Clínica Estética',  bg: '#122a5e' },
      { initial: 'A', name: 'Academia Online',   bg: '#0e2d56' },
      { initial: 'C', name: 'Consultora MKT',    bg: '#112648' },
      { initial: 'I', name: 'Inmobiliaria',      bg: '#0a2040' },
      { initial: 'E', name: 'E-commerce',        bg: '#132c5a' },
      { initial: 'R', name: 'Restaurante',       bg: '#0d2444' },
    ];

    function buildItems(list) {
      return list.map(function (item) {
        return (
          '<div class="marquee-item">' +
            '<div class="marquee-icon liquid-glass" style="background:' + item.bg + ';border-radius:6px;">' +
              item.initial +
            '</div>' +
            '<span class="marquee-name">' + item.name + '</span>' +
          '</div>'
        );
      }).join('');
    }

    var track = document.getElementById('marqueeTrack');
    // Duplicate for seamless loop
    track.innerHTML = buildItems(items) + buildItems(items);
  })();
</script>

</body>
</html>
